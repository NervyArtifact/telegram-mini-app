<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Напоминания</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --tg-theme-bg-color: #ffffff;
    --tg-theme-text-color: #222222;
    --tg-theme-hint-color: #999999;
    --tg-theme-link-color: #2481cc;
    --tg-theme-button-color: #2481cc;
    --tg-theme-button-text-color: #ffffff;
    --tg-theme-secondary-bg-color: #f0f0f0;
    --tg-theme-destructive-text-color: #e53e3e;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;

    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 999px;

    --dur-fast: 150ms;
    --dur-base: 220ms;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100dvh;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
    padding: var(--space-4);
    padding-bottom: 100px; /* место под MainButton */
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    margin: var(--space-1) 0 var(--space-1);
    letter-spacing: -0.01em;
  }

  p.hint {
    color: var(--tg-theme-hint-color);
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 var(--space-5);
  }

  h2.section {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--tg-theme-hint-color);
    margin: var(--space-6) var(--space-1) var(--space-2);
  }

  .card {
    background: var(--tg-theme-secondary-bg-color);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
  }

  .add-row {
    display: flex;
    gap: var(--space-2);
    align-items: center;
  }

  .field {
    border: none;
    background: var(--tg-theme-bg-color);
    border-radius: var(--radius-md);
    padding: var(--space-3);
    font-size: 16px; /* >=16px чтобы iOS не зумил при фокусе */
    font-family: inherit;
    color: var(--tg-theme-text-color);
    min-height: 44px;
    transition: box-shadow var(--dur-fast) var(--ease-out);
  }

  .field::placeholder { color: var(--tg-theme-hint-color); }

  .field:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--tg-theme-link-color);
  }

  #newItem { width: 100%; margin-bottom: var(--space-2); }
  #newDate, #newTime { flex: 1; min-width: 0; }

  .icon-btn {
    flex: 0 0 auto;
    border: none;
    border-radius: var(--radius-md);
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform var(--dur-fast) var(--ease-out), opacity var(--dur-fast) var(--ease-out);
  }

  .icon-btn:active { transform: scale(0.93); }

  .add-btn {
    background: var(--tg-theme-button-color);
    color: var(--tg-theme-button-text-color);
  }

  .todo-list { list-style: none; margin: 0; padding: 0; }

  .todo-list li {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) 0;
    border-bottom: 1px solid color-mix(in srgb, var(--tg-theme-hint-color) 20%, transparent);
    animation: item-in var(--dur-base) var(--ease-out);
  }

  .todo-list li:last-child { border-bottom: none; }

  @keyframes item-in {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item-icon {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    background: color-mix(in srgb, var(--tg-theme-link-color) 14%, transparent);
    color: var(--tg-theme-link-color);
  }

  .item-icon.is-new {
    background: color-mix(in srgb, #10b981 16%, transparent);
    color: #10b981;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-text {
    display: block;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
    overflow-wrap: anywhere;
  }

  .item-meta {
    display: block;
    font-size: 13px;
    color: var(--tg-theme-hint-color);
    margin-top: 2px;
  }

  li.marked-delete .item-text {
    text-decoration: line-through;
    color: var(--tg-theme-hint-color);
  }

  .del-btn {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: var(--tg-theme-hint-color);
    width: 36px;
    height: 36px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }

  .del-btn:active { transform: scale(0.93); }

  .del-btn.active {
    color: var(--tg-theme-destructive-text-color);
    background: color-mix(in srgb, var(--tg-theme-destructive-text-color) 12%, transparent);
  }

  .empty, .skeleton-wrap {
    text-align: center;
    padding: var(--space-4) 0;
  }

  .empty {
    color: var(--tg-theme-hint-color);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
  }

  .empty svg { opacity: 0.5; }

  .skeleton-row {
    height: 44px;
    border-radius: var(--radius-md);
    margin-bottom: var(--space-2);
    background: linear-gradient(
      90deg,
      color-mix(in srgb, var(--tg-theme-hint-color) 12%, transparent) 25%,
      color-mix(in srgb, var(--tg-theme-hint-color) 22%, transparent) 37%,
      color-mix(in srgb, var(--tg-theme-hint-color) 12%, transparent) 63%
    );
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }

  .skeleton-row:last-child { margin-bottom: 0; }

  @keyframes shimmer {
    0% { background-position: 100% 50%; }
    100% { background-position: 0 50%; }
  }

  #scheduleType { width: 100%; margin-bottom: var(--space-2); }

  .weekday-picker {
    display: flex;
    gap: 6px;
    margin-bottom: var(--space-2);
  }

  .weekday-btn {
    flex: 1;
    height: 36px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }

  .weekday-btn.active {
    background: var(--tg-theme-button-color);
    color: var(--tg-theme-button-text-color);
  }

  .edit-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
    background: color-mix(in srgb, var(--tg-theme-link-color) 12%, transparent);
    color: var(--tg-theme-link-color);
    font-size: 13px;
    font-weight: 500;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-2);
  }

  .edit-banner button {
    border: none;
    background: transparent;
    color: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .edit-btn {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: var(--tg-theme-hint-color);
    width: 36px;
    height: 36px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }

  .edit-btn:active { transform: scale(0.93); }

  li.marked-edit .item-text,
  li.marked-edit .item-meta {
    color: var(--tg-theme-link-color);
  }

  @media (prefers-reduced-motion: reduce) {
    .todo-list li { animation: none; }
    .skeleton-row { animation: none; }
    .icon-btn, .del-btn, .edit-btn { transition: none; }
  }
</style>
</head>
<body>

  <h1>Новое напоминание</h1>
  <p class="hint">Укажите текст и время — бот напомнит начиная с этого момента и будет повторять, пока не отметите готово в чате.</p>
  <p id="debugInfo" style="font-size:11px;color:#e5484d;word-break:break-all;background:#fff0f0;padding:8px;border-radius:8px;"></p>

  <div class="card">
    <div class="edit-banner" id="editBanner" style="display:none;">
      <span>✏️ Редактирование напоминания</span>
      <button type="button" id="cancelEditBtn">Отменить</button>
    </div>
    <input class="field" id="newItem" placeholder="Новая задача..." aria-label="Текст напоминания" />
    <select class="field" id="scheduleType" aria-label="Тип напоминания">
      <option value="once">Один раз</option>
      <option value="daily">Каждый день</option>
      <option value="weekly">По дням недели</option>
    </select>
    <div class="weekday-picker" id="weekdayPicker" style="display:none;"></div>
    <div class="add-row">
      <input class="field" id="newDate" type="date" aria-label="Дата напоминания" />
      <input class="field" id="newTime" type="time" aria-label="Время напоминания" />
      <button class="icon-btn add-btn" id="addBtn" aria-label="Добавить напоминание">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <h2 class="section">Текущие напоминания</h2>
  <div class="card">
    <ul class="todo-list" id="existingList"></ul>
    <div class="skeleton-wrap" id="existingSkeleton">
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
    </div>
    <div class="empty" id="existingEmpty" style="display:none;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 8v4l2.5 2.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="existingEmptyText">Активных напоминаний нет</span>
    </div>
  </div>

  <h2 class="section" id="newSectionTitle" style="display:none;">Ещё не отправлены</h2>
  <div class="card" id="newCard" style="display:none;">
    <ul class="todo-list" id="newList"></ul>
  </div>

<script>
  const tg = window.Telegram?.WebApp;

  // Список задач читается через приватный прокси (Cloudflare Worker), а не
  // напрямую из GitHub — так данные не видны никому постороннему.
  const PROXY_URL = "https://withered-bar-77bb.hasan-rustamzoda.workers.dev/";
  const APP_KEY = "qwertyuiop123456789";

  if (tg) {
    tg.ready();
    tg.expand();

    const theme = tg.themeParams || {};
    const root = document.documentElement.style;
    if (theme.bg_color) root.setProperty('--tg-theme-bg-color', theme.bg_color);
    if (theme.text_color) root.setProperty('--tg-theme-text-color', theme.text_color);
    if (theme.hint_color) root.setProperty('--tg-theme-hint-color', theme.hint_color);
    if (theme.link_color) root.setProperty('--tg-theme-link-color', theme.link_color);
    if (theme.button_color) root.setProperty('--tg-theme-button-color', theme.button_color);
    if (theme.button_text_color) root.setProperty('--tg-theme-button-text-color', theme.button_text_color);
    if (theme.secondary_bg_color) root.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
    if (theme.destructive_text_color) root.setProperty('--tg-theme-destructive-text-color', theme.destructive_text_color);
  }

  // KeyboardButton web_app (через который открывается это приложение) НЕ
  // передаёт initData/initDataUnsafe.user, и Telegram ПОЛНОСТЬЮ заменяет
  // query-строку и hash-фрагмент URL своими служебными параметрами —
  // передать туда что-то своё нельзя (проверено на практике). Единственное,
  // что Telegram не трогает — путь URL. Поэтому бот передаёт chat_id прямо
  // в пути ссылки (.../telegram-mini-app/<chat_id>), а мы читаем его отсюда.
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const lastPart = pathParts[pathParts.length - 1];
  const uidFromPath = lastPart && /^\d+$/.test(lastPart) ? lastPart : null;
  const myUserId = uidFromPath || tg?.initDataUnsafe?.user?.id;

  // ВРЕМЕННЫЙ ДЕБАГ — удалить после диагностики
  document.getElementById('debugInfo').textContent =
    `DEBUG path=${window.location.pathname} uidFromPath=${uidFromPath} tgUser=${tg?.initDataUnsafe?.user?.id} myUserId=${myUserId}`;

  let newItems = [];
  let pendingEdits = new Map(); // id -> { id, text, schedule }
  let editingId = null;
  let existingTasks = [];
  let deleteIds = new Set();

  const WEEKDAY_SHORT = ["пн", "вт", "ср", "чт", "пт", "сб", "вс"];
  let selectedWeekday = 0;

  const clockIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 7v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const repeatIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const trashIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const closeIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
  const editIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function pad2(n) { return String(n).padStart(2, "0"); }

  function isToday(d) {
    const now = new Date();
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
  }

  function formatExisting(t) {
    if (t.mode === "time" && t.remind_at) {
      const d = new Date(t.remind_at * 1000);
      const hh = pad2(d.getHours());
      const mm = pad2(d.getMinutes());
      const dateLabel = isToday(d) ? "сегодня" : `${pad2(d.getDate())}.${pad2(d.getMonth() + 1)}`;
      return { icon: clockIcon, label: `${dateLabel}, ${hh}:${mm}` };
    }
    if (t.mode === "interval" && t.interval_minutes) {
      const m = t.interval_minutes;
      let label;
      if (m % (60 * 24) === 0) label = `каждые ${m / (60 * 24)} д.`;
      else if (m % 60 === 0) label = `каждые ${m / 60} ч.`;
      else label = `каждые ${m} мин.`;
      return { icon: repeatIcon, label };
    }
    if (t.mode === "recurring") {
      const hh = pad2(t.daily_hour);
      const mm = pad2(t.daily_minute);
      if (t.weekday === null || t.weekday === undefined) {
        return { icon: repeatIcon, label: `каждый день, ${hh}:${mm}` };
      }
      return { icon: repeatIcon, label: `по ${WEEKDAY_SHORT[t.weekday]}, ${hh}:${mm}` };
    }
    return { icon: clockIcon, label: "" };
  }

  function scheduleLabel(sched) {
    if (sched.kind === "once") {
      const d = new Date(`${sched.date}T${sched.time}`);
      const dateLabel = isToday(d) ? "сегодня" : `${pad2(d.getDate())}.${pad2(d.getMonth() + 1)}`;
      return `${dateLabel}, ${sched.time}`;
    }
    if (sched.kind === "daily") return `каждый день, ${sched.time}`;
    return `по ${WEEKDAY_SHORT[sched.weekday]}, ${sched.time}`;
  }

  async function loadExisting() {
    const skeleton = document.getElementById('existingSkeleton');
    const emptyEl = document.getElementById('existingEmpty');
    const emptyText = document.getElementById('existingEmptyText');
    skeleton.style.display = 'block';
    emptyEl.style.display = 'none';

    if (!myUserId) {
      // Не удалось определить пользователя Telegram — не показываем НИЧЕГО,
      // чтобы случайно не показать чужие напоминания.
      skeleton.style.display = 'none';
      existingTasks = [];
      emptyText.textContent = "Не удалось определить пользователя";
      emptyEl.style.display = "flex";
      return;
    }

    try {
      const res = await fetch(`${PROXY_URL}?key=${encodeURIComponent(APP_KEY)}&uid=${encodeURIComponent(myUserId)}&_=${Date.now()}`, {
        cache: "no-store",
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // Фильтрация уже сделана на сервере (Worker) по chat_id — здесь только
      // на всякий случай перепроверяем done, чужие данные сюда не попадают.
      existingTasks = (data.tasks || []).filter(t => !t.done);
    } catch (err) {
      existingTasks = [];
      skeleton.style.display = 'none';
      emptyText.textContent = "Не удалось загрузить список";
      emptyEl.style.display = "flex";
      return;
    }

    skeleton.style.display = 'none';
    renderExisting();
  }

  function renderExisting() {
    const listEl = document.getElementById('existingList');
    const emptyEl = document.getElementById('existingEmpty');
    const emptyText = document.getElementById('existingEmptyText');
    listEl.innerHTML = '';

    if (existingTasks.length === 0) {
      emptyText.textContent = "Активных напоминаний нет";
      emptyEl.style.display = "flex";
      return;
    }
    emptyEl.style.display = "none";

    existingTasks.forEach((t) => {
      const meta = formatExisting(t);
      const markedDelete = deleteIds.has(t.id);
      const markedEdit = pendingEdits.has(t.id);
      const li = document.createElement('li');
      if (markedDelete) li.classList.add('marked-delete');
      if (markedEdit) li.classList.add('marked-edit');
      const editBtnHtml = t.mode !== 'interval'
        ? `<button class="edit-btn" data-id="${t.id}" aria-label="Изменить «${escapeHtml(t.text)}»">${editIcon}</button>`
        : '';
      const metaLabel = markedEdit ? `${meta.label} · изменение добавлено ниже` : meta.label;
      li.innerHTML = `
        <span class="item-icon">${meta.icon}</span>
        <span class="item-body">
          <span class="item-text">${escapeHtml(t.text)}</span>
          <span class="item-meta">${metaLabel}</span>
        </span>
        ${editBtnHtml}
        <button class="del-btn ${markedDelete ? 'active' : ''}" data-id="${t.id}" aria-label="Удалить напоминание «${escapeHtml(t.text)}»">${trashIcon}</button>
      `;
      listEl.appendChild(li);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('existingList').addEventListener('click', (e) => {
    const editBtn = e.target.closest('.edit-btn');
    if (editBtn) {
      const id = Number(editBtn.dataset.id);
      const t = existingTasks.find((x) => x.id === id);
      if (t) startEdit(t);
      return;
    }
    const btn = e.target.closest('.del-btn');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    if (deleteIds.has(id)) deleteIds.delete(id);
    else deleteIds.add(id);
    tg?.HapticFeedback?.impactOccurred('light');
    renderExisting();
    updateMainButton();
  });

  function renderNew() {
    const listEl = document.getElementById('newList');
    const card = document.getElementById('newCard');
    const title = document.getElementById('newSectionTitle');
    listEl.innerHTML = '';

    const totalCount = newItems.length + pendingEdits.size;
    if (totalCount === 0) {
      card.style.display = 'none';
      title.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    title.style.display = 'block';

    newItems.forEach((item, i) => {
      const li = document.createElement('li');
      const label = scheduleLabel(item.schedule);
      const icon = item.schedule.kind === 'once' ? clockIcon : repeatIcon;
      li.innerHTML = `
        <span class="item-icon is-new">${icon}</span>
        <span class="item-body">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <span class="item-meta">${label}</span>
        </span>
        <button class="del-btn active" data-kind="new" data-i="${i}" aria-label="Убрать «${escapeHtml(item.text)}» из списка">${closeIcon}</button>
      `;
      listEl.appendChild(li);
    });

    pendingEdits.forEach((item, id) => {
      const li = document.createElement('li');
      const label = scheduleLabel(item.schedule);
      li.innerHTML = `
        <span class="item-icon is-new">${editIcon}</span>
        <span class="item-body">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <span class="item-meta">изменение — ${label}</span>
        </span>
        <button class="del-btn active" data-kind="edit" data-id="${id}" aria-label="Отменить изменение">${closeIcon}</button>
      `;
      listEl.appendChild(li);
    });
  }

  document.getElementById('newList').addEventListener('click', (e) => {
    const btn = e.target.closest('.del-btn');
    if (!btn) return;
    if (btn.dataset.kind === 'edit') {
      pendingEdits.delete(Number(btn.dataset.id));
      renderExisting();
    } else {
      const i = Number(btn.dataset.i);
      newItems.splice(i, 1);
    }
    renderNew();
    updateMainButton();
  });

  function updateMainButton() {
    if (!tg) return;
    const addCount = newItems.length;
    const editCount = pendingEdits.size;
    const delCount = deleteIds.size;

    if (addCount === 0 && editCount === 0 && delCount === 0) {
      tg.MainButton.hide();
      return;
    }

    const parts = [];
    if (addCount) parts.push(`добавить ${addCount}`);
    if (editCount) parts.push(`изменить ${editCount}`);
    if (delCount) parts.push(`удалить ${delCount}`);
    tg.MainButton.setText(`Отправить боту (${parts.join(", ")})`);
    tg.MainButton.show();
  }

  function todayLocalISO() {
    const now = new Date();
    return `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
  }

  // По умолчанию — сегодняшняя дата, чтобы не заставлять выбирать её каждый раз.
  document.getElementById('newDate').value = todayLocalISO();
  document.getElementById('newDate').min = todayLocalISO();

  function renderWeekdayPicker() {
    const wrap = document.getElementById('weekdayPicker');
    wrap.innerHTML = WEEKDAY_SHORT.map((label, i) =>
      `<button type="button" class="weekday-btn ${i === selectedWeekday ? 'active' : ''}" data-day="${i}">${label}</button>`
    ).join('');
  }
  renderWeekdayPicker();

  document.getElementById('weekdayPicker').addEventListener('click', (e) => {
    const btn = e.target.closest('.weekday-btn');
    if (!btn) return;
    selectedWeekday = Number(btn.dataset.day);
    renderWeekdayPicker();
  });

  function updateScheduleTypeUI() {
    const kind = document.getElementById('scheduleType').value;
    document.getElementById('newDate').style.display = kind === 'once' ? '' : 'none';
    document.getElementById('weekdayPicker').style.display = kind === 'weekly' ? 'flex' : 'none';
  }
  document.getElementById('scheduleType').addEventListener('change', updateScheduleTypeUI);
  updateScheduleTypeUI();

  function buildSchedule(time) {
    const kind = document.getElementById('scheduleType').value;
    if (kind === 'once') {
      const date = document.getElementById('newDate').value || todayLocalISO();
      return { kind: 'once', date, time };
    }
    if (kind === 'weekly') {
      return { kind: 'weekly', weekday: selectedWeekday, time };
    }
    return { kind: 'daily', time };
  }

  function resetForm() {
    document.getElementById('newItem').value = '';
    document.getElementById('newTime').value = '';
    document.getElementById('newDate').value = todayLocalISO();
    document.getElementById('scheduleType').value = 'once';
    selectedWeekday = 0;
    renderWeekdayPicker();
    updateScheduleTypeUI();
  }

  function startEdit(t) {
    editingId = t.id;
    document.getElementById('newItem').value = t.text;
    if (t.mode === 'recurring') {
      document.getElementById('scheduleType').value = (t.weekday === null || t.weekday === undefined) ? 'daily' : 'weekly';
      if (t.weekday !== null && t.weekday !== undefined) selectedWeekday = t.weekday;
      document.getElementById('newTime').value = `${pad2(t.daily_hour)}:${pad2(t.daily_minute)}`;
    } else {
      document.getElementById('scheduleType').value = 'once';
      const d = new Date(t.remind_at * 1000);
      document.getElementById('newDate').value = `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
      document.getElementById('newTime').value = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }
    renderWeekdayPicker();
    updateScheduleTypeUI();
    document.getElementById('editBanner').style.display = 'flex';
    document.getElementById('newItem').focus();
    tg?.HapticFeedback?.impactOccurred('light');
  }

  function cancelEdit() {
    editingId = null;
    document.getElementById('editBanner').style.display = 'none';
    resetForm();
  }
  document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);

  function addItem() {
    const textInput = document.getElementById('newItem');
    const timeInput = document.getElementById('newTime');
    const text = textInput.value.trim();
    const time = timeInput.value;

    if (!text) {
      textInput.focus();
      return;
    }
    if (!time) {
      tg?.showAlert ? tg.showAlert('Укажите время напоминания') : alert('Укажите время напоминания');
      timeInput.focus();
      return;
    }

    const schedule = buildSchedule(time);

    if (editingId !== null) {
      pendingEdits.set(editingId, { id: editingId, text, schedule });
      editingId = null;
      document.getElementById('editBanner').style.display = 'none';
      resetForm();
      tg?.HapticFeedback?.impactOccurred('light');
      renderExisting();
      renderNew();
      updateMainButton();
      return;
    }

    newItems.push({ text, schedule });
    resetForm();
    tg?.HapticFeedback?.impactOccurred('light');
    renderNew();
    updateMainButton();
    textInput.focus();
  }

  document.getElementById('addBtn').addEventListener('click', addItem);
  document.getElementById('newItem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
  });
  document.getElementById('newTime').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
  });

  if (tg) {
    tg.MainButton.onClick(() => {
      tg.sendData(JSON.stringify({
        new_items: newItems.map(i => ({ text: i.text, schedule: i.schedule })),
        edit_items: Array.from(pendingEdits.values()),
        delete_ids: Array.from(deleteIds),
      }));
    });
  }

  loadExisting();
  renderNew();
  updateMainButton();
</script>
</body>
</html>
