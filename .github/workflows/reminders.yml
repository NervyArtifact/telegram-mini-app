name: Task Reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: task-reminders
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run reminder check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python reminder-check.py

      - name: Save updated task state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update reminder state"
          file_pattern: tasks.json
