<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Мини-приложение</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --tg-theme-bg-color: #ffffff;
    --tg-theme-text-color: #222222;
    --tg-theme-hint-color: #999999;
    --tg-theme-link-color: #2481cc;
    --tg-theme-button-color: #2481cc;
    --tg-theme-button-text-color: #ffffff;
    --tg-theme-secondary-bg-color: #f0f0f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
    padding: 16px;
    padding-bottom: 96px; /* место под MainButton */
  }
  h1 { font-size: 20px; margin: 8px 0 4px; }
  p.hint { color: var(--tg-theme-hint-color); font-size: 14px; margin: 0 0 20px; }
  h2.section { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--tg-theme-hint-color); margin: 20px 4px 8px; }

  .card {
    background: var(--tg-theme-secondary-bg-color);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  .add-row { display: flex; gap: 8px; align-items: center; }

  .field {
    border: none;
    background: var(--tg-theme-bg-color);
    border-radius: 10px;
    padding: 12px;
    font-size: 16px;
    color: var(--tg-theme-text-color);
  }
  .field:focus { outline: 2px solid var(--tg-theme-link-color); }

  #newItem { flex: 1; min-width: 0; }
  #newTime { flex: 0 0 auto; width: 108px; }

  .add-btn {
    flex: 0 0 auto;
    border: none;
    border-radius: 10px;
    background: var(--tg-theme-button-color);
    color: var(--tg-theme-button-text-color);
    font-size: 20px;
    line-height: 1;
    width: 44px;
    height: 44px;
  }

  .todo-list { list-style: none; margin: 0; padding: 0; }
  .todo-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .todo-list li:last-child { border-bottom: none; }
  .todo-list .item-text { flex: 1; }
  .todo-list .item-time {
    flex: 0 0 auto;
    font-size: 13px;
    color: var(--tg-theme-hint-color);
    background: var(--tg-theme-bg-color);
    border-radius: 8px;
    padding: 3px 8px;
  }
  .todo-list li.new .item-time { background: transparent; color: var(--tg-theme-link-color); }
  .todo-list li.marked-delete .item-text { text-decoration: line-through; color: var(--tg-theme-hint-color); }

  .del-btn {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: var(--tg-theme-hint-color);
    font-size: 18px;
    width: 28px;
    height: 28px;
    border-radius: 8px;
  }
  .del-btn.active { color: #d33; background: rgba(221,51,51,0.1); }

  .empty { color: var(--tg-theme-hint-color); font-size: 14px; text-align: center; padding: 12px 0; }
</style>
</head>
<body>

  <h1>Список задач</h1>
  <p class="hint">Добавляйте новые напоминания или удаляйте текущие. Бот проверяет изменения раз в ~15 минут.</p>

  <div class="card">
    <div class="add-row">
      <input class="field" id="newItem" placeholder="Новая задача..." />
      <input class="field" id="newTime" type="time" />
      <button class="add-btn" id="addBtn" aria-label="Добавить">+</button>
    </div>
  </div>

  <h2 class="section">Текущие напоминания</h2>
  <div class="card">
    <ul class="todo-list" id="existingList"></ul>
    <div class="empty" id="existingEmpty" style="display:none;">Загрузка...</div>
  </div>

  <h2 class="section" id="newSectionTitle" style="display:none;">Новые (ещё не отправлены)</h2>
  <div class="card" id="newCard" style="display:none;">
    <ul class="todo-list" id="newList"></ul>
  </div>

<script>
  const tg = window.Telegram?.WebApp;

  // ЕСЛИ переименуете/перенесёте репозиторий — поправьте эти две строки:
  const GH_OWNER = "NervyArtifact";
  const GH_REPO = "telegram-mini-app";
  const TASKS_URL = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/tasks.json`;

  // --- Инициализация SDK ---
  if (tg) {
    tg.ready();
    tg.expand();

    const theme = tg.themeParams || {};
    const root = document.documentElement.style;
    if (theme.bg_color) root.setProperty('--tg-theme-bg-color', theme.bg_color);
    if (theme.text_color) root.setProperty('--tg-theme-text-color', theme.text_color);
    if (theme.hint_color) root.setProperty('--tg-theme-hint-color', theme.hint_color);
    if (theme.link_color) root.setProperty('--tg-theme-link-color', theme.link_color);
    if (theme.button_color) root.setProperty('--tg-theme-button-color', theme.button_color);
    if (theme.button_text_color) root.setProperty('--tg-theme-button-text-color', theme.button_text_color);
    if (theme.secondary_bg_color) root.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
  }

  const myUserId = tg?.initDataUnsafe?.user?.id;

  // --- Состояние ---
  let newItems = [];       // { text, time } — ещё не отправленные
  let existingTasks = [];  // загруженные из tasks.json
  let deleteIds = new Set();

  function formatExisting(t) {
    if (t.mode === "time" && t.remind_at) {
      const d = new Date(t.remind_at * 1000);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }
    if (t.mode === "interval" && t.interval_minutes) {
      const m = t.interval_minutes;
      if (m % (60 * 24) === 0) return `каждые ${m / (60 * 24)}д`;
      if (m % 60 === 0) return `каждые ${m / 60}ч`;
      return `каждые ${m}м`;
    }
    return "";
  }

  async function loadExisting() {
    const listEl = document.getElementById('existingList');
    const emptyEl = document.getElementById('existingEmpty');
    try {
      const res = await fetch(TASKS_URL, { cache: "no-store" });
      const data = await res.json();
      existingTasks = (data.tasks || []).filter(t => {
        if (t.done) return false;
        if (myUserId && t.chat_id !== myUserId) return false;
        return true;
      });
    } catch (err) {
      existingTasks = [];
      emptyEl.textContent = "Не удалось загрузить список.";
      emptyEl.style.display = "block";
      return;
    }
    renderExisting();
  }

  function renderExisting() {
    const listEl = document.getElementById('existingList');
    const emptyEl = document.getElementById('existingEmpty');
    listEl.innerHTML = '';

    if (existingTasks.length === 0) {
      emptyEl.textContent = "Активных напоминаний нет";
      emptyEl.style.display = "block";
      return;
    }
    emptyEl.style.display = "none";

    existingTasks.forEach((t) => {
      const li = document.createElement('li');
      const marked = deleteIds.has(t.id);
      if (marked) li.classList.add('marked-delete');
      li.innerHTML = `
        <span class="item-text">${t.text}</span>
        <span class="item-time">${formatExisting(t)}</span>
        <button class="del-btn ${marked ? 'active' : ''}" data-id="${t.id}" aria-label="Удалить">🗑</button>
      `;
      listEl.appendChild(li);
    });
  }

  document.getElementById('existingList').addEventListener('click', (e) => {
    const btn = e.target.closest('.del-btn');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    if (deleteIds.has(id)) deleteIds.delete(id);
    else deleteIds.add(id);
    tg?.HapticFeedback?.impactOccurred('light');
    renderExisting();
    updateMainButton();
  });

  function renderNew() {
    const listEl = document.getElementById('newList');
    const card = document.getElementById('newCard');
    const title = document.getElementById('newSectionTitle');
    listEl.innerHTML = '';

    if (newItems.length === 0) {
      card.style.display = 'none';
      title.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    title.style.display = 'block';

    newItems.forEach((item, i) => {
      const li = document.createElement('li');
      li.classList.add('new');
      li.innerHTML = `
        <span class="item-text">${item.text}</span>
        <span class="item-time">${item.time}</span>
        <button class="del-btn" data-i="${i}" aria-label="Убрать">✕</button>
      `;
      listEl.appendChild(li);
    });
  }

  document.getElementById('newList').addEventListener('click', (e) => {
    const btn = e.target.closest('.del-btn');
    if (!btn) return;
    const i = Number(btn.dataset.i);
    newItems.splice(i, 1);
    renderNew();
    updateMainButton();
  });

  function updateMainButton() {
    if (!tg) return;
    const addCount = newItems.length;
    const delCount = deleteIds.size;

    if (addCount === 0 && delCount === 0) {
      tg.MainButton.hide();
      return;
    }

    const parts = [];
    if (addCount) parts.push(`добавить ${addCount}`);
    if (delCount) parts.push(`удалить ${delCount}`);
    tg.MainButton.setText(`Отправить боту (${parts.join(", ")})`);
    tg.MainButton.show();
  }

  function addItem() {
    const textInput = document.getElementById('newItem');
    const timeInput = document.getElementById('newTime');
    const text = textInput.value.trim();
    const time = timeInput.value;

    if (!text) return;
    if (!time) {
      tg?.showAlert ? tg.showAlert('Укажите время напоминания') : alert('Укажите время напоминания');
      return;
    }

    newItems.push({ text, time });
    textInput.value = '';
    timeInput.value = '';
    tg?.HapticFeedback?.impactOccurred('light');
    renderNew();
    updateMainButton();
  }

  document.getElementById('addBtn').addEventListener('click', addItem);
  document.getElementById('newItem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
  });
  document.getElementById('newTime').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
  });

  // --- Отправка данных обратно боту ---
  if (tg) {
    tg.MainButton.onClick(() => {
      tg.sendData(JSON.stringify({
        new_items: newItems,
        delete_ids: Array.from(deleteIds),
      }));
    });
  }

  loadExisting();
  renderNew();
  updateMainButton();
</script>
</body>
</html>
