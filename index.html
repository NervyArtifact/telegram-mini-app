<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Напоминания</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --tg-theme-bg-color: #ffffff;
    --tg-theme-text-color: #222222;
    --tg-theme-hint-color: #999999;
    --tg-theme-link-color: #2481cc;
    --tg-theme-button-color: #2481cc;
    --tg-theme-button-text-color: #ffffff;
    --tg-theme-secondary-bg-color: #f0f0f0;
    --tg-theme-destructive-text-color: #e53e3e;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;

    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 999px;

    --dur-fast: 150ms;
    --dur-base: 220ms;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100dvh;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
    padding: var(--space-4);
    padding-bottom: 100px;
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    margin: var(--space-1) 0 var(--space-1);
    letter-spacing: -0.01em;
  }

  p.hint {
    color: var(--tg-theme-hint-color);
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 var(--space-5);
  }

  h2.section {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--tg-theme-hint-color);
    margin: var(--space-6) var(--space-1) var(--space-2);
  }

  .card {
    background: var(--tg-theme-secondary-bg-color);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
  }

  .add-row {
    display: flex;
    gap: var(--space-2);
    align-items: center;
  }

  .field {
    border: none;
    background: var(--tg-theme-bg-color);
    border-radius: var(--radius-md);
    padding: var(--space-3);
    font-size: 16px;
    font-family: inherit;
    color: var(--tg-theme-text-color);
    min-height: 44px;
    transition: box-shadow var(--dur-fast) var(--ease-out);
  }

  .field::placeholder { color: var(--tg-theme-hint-color); }

  .field:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--tg-theme-link-color);
  }

  #newItem { flex: 1; min-width: 0; }
  #newTime { flex: 0 0 auto; width: 118px; }

  .icon-btn {
    flex: 0 0 auto;
    border: none;
    border-radius: var(--radius-md);
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform var(--dur-fast) var(--ease-out), opacity var(--dur-fast) var(--ease-out);
  }

  .icon-btn:active { transform: scale(0.93); }

  .add-btn {
    background: var(--tg-theme-button-color);
    color: var(--tg-theme-button-text-color);
  }

  .todo-list { list-style: none; margin: 0; padding: 0; }

  .todo-list li {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) 0;
    border-bottom: 1px solid color-mix(in srgb, var(--tg-theme-hint-color) 20%, transparent);
    animation: item-in var(--dur-base) var(--ease-out);
  }

  .todo-list li:last-child { border-bottom: none; }

  @keyframes item-in {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item-icon {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    background: color-mix(in srgb, var(--tg-theme-link-color) 14%, transparent);
    color: var(--tg-theme-link-color);
  }

  .item-icon.is-new {
    background: color-mix(in srgb, #10b981 16%, transparent);
    color: #10b981;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-text {
    display: block;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
    overflow-wrap: anywhere;
  }

  .item-meta {
    display: block;
    font-size: 13px;
    color: var(--tg-theme-hint-color);
    margin-top: 2px;
  }

  li.marked-delete .item-text {
    text-decoration: line-through;
    color: var(--tg-theme-hint-color);
  }

  .del-btn {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: var(--tg-theme-hint-color);
    width: 36px;
    height: 36px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }

  .del-btn:active { transform: scale(0.93); }

  .del-btn.active {
    color: var(--tg-theme-destructive-text-color);
    background: color-mix(in srgb, var(--tg-theme-destructive-text-color) 12%, transparent);
  }

  .empty, .skeleton-wrap {
    text-align: center;
    padding: var(--space-4) 0;
  }

  .empty {
    color: var(--tg-theme-hint-color);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
  }

  .empty svg { opacity: 0.5; }

  .skeleton-row {
    height: 44px;
    border-radius: var(--radius-md);
    margin-bottom: var(--space-2);
    background: linear-gradient(
      90deg,
      color-mix(in srgb, var(--tg-theme-hint-color) 12%, transparent) 25%,
      color-mix(in srgb, var(--tg-theme-hint-color) 22%, transparent) 37%,
      color-mix(in srgb, var(--tg-theme-hint-color) 12%, transparent) 63%
    );
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }

  .skeleton-row:last-child { margin-bottom: 0; }

  @keyframes shimmer {
    0% { background-position: 100% 50%; }
    100% { background-position: 0 50%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .todo-list li { animation: none; }
    .skeleton-row { animation: none; }
    .icon-btn, .del-btn { transition: none; }
  }
</style>
</head>
<body>

  <h1>Новое напоминание</h1>
  <p class="hint">Укажите текст и время — бот напомнит начиная с этого момента и будет повторять, пока не отметите готово в чате.</p>

  <div class="card">
    <div class="add-row">
      <input class="field" id="newItem" placeholder="Новая задача..." aria-label="Текст напоминания" />
      <input class="field" id="newTime" type="time" aria-label="Время напоминания" />
      <button class="icon-btn add-btn" id="addBtn" aria-label="Добавить напоминание">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <h2 class="section">Текущие напоминания</h2>
  <div class="card">
    <ul class="todo-list" id="existingList"></ul>
    <div class="skeleton-wrap" id="existingSkeleton">
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
    </div>
    <div class="empty" id="existingEmpty" style="display:none;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 8v4l2.5 2.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="existingEmptyText">Активных напоминаний нет</span>
    </div>
  </div>

  <h2 class="section" id="newSectionTitle" style="display:none;">Ещё не отправлены</h2>
  <div class="card" id="newCard" style="display:none;">
    <ul class="todo-list" id="newList"></ul>
  </div>

<script>
  const tg = window.Telegram?.WebApp;

  const GH_OWNER = "NervyArtifact";
  const GH_REPO = "telegram-mini-app";
  const TASKS_URL = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/tasks.json`;

  if (tg) {
    tg.ready();
    tg.expand();

    const theme = tg.themeParams || {};
    const root = document.documentElement.style;
    if (theme.bg_color) root.setProperty('--tg-theme-bg-color', theme.bg_color);
    if (theme.text_color) root.setProperty('--tg-theme-text-color', theme.text_color);
    if (theme.hint_color) root.setProperty('--tg-theme-hint-color', theme.hint_color);
    if (theme.link_color) root.setProperty('--tg-theme-link-color', theme.link_color);
    if (theme.button_color) root.setProperty('--tg-theme-button-color', theme.button_color);
    if (theme.button_text_color) root.setProperty('--tg-theme-button-text-color', theme.button_text_color);
    if (theme.secondary_bg_color) root.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
    if (theme.destructive_text_color) root.setProperty('--tg-theme-destructive-text-color', theme.destructive_text_color);
  }

  const myUserId = tg?.initDataUnsafe?.user?.id;

  let newItems = [];
  let existingTasks = [];
  let deleteIds = new Set();

  const clockIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 7v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const repeatIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const trashIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const closeIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;

  function formatExisting(t) {
    if (t.mode === "time" && t.remind_at) {
      const d = new Date(t.remind_at * 1000);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return { icon: clockIcon, label: `с ${hh}:${mm}` };
    }
    if (t.mode === "interval" && t.interval_minutes) {
      const m = t.interval_minutes;
      let label;
      if (m % (60 * 24) === 0) label = `каждые ${m / (60 * 24)} д.`;
      else if (m % 60 === 0) label = `каждые ${m / 60} ч.`;
      else label = `каждые ${m} мин.`;
      return { icon: repeatIcon, label };
    }
    return { icon: clockIcon, label: "" };
  }

  async function loadExisting() {
    const skeleton = document.getElementById('existingSkeleton');
    const emptyEl = document.getElementById('existingEmpty');
    const emptyText = document.getElementById('existingEmptyText');
    skeleton.style.display = 'block';
    emptyEl.style.display = 'none';

    try {
      const res = await fetch(`${TASKS_URL}?_=${Date.now()}`, { cache: "no-store" });
      const data = await res.json();
      existingTasks = (data.tasks || []).filter(t => {
        if (t.done) return false;
        if (myUserId && t.chat_id !== myUserId) return false;
        return true;
      });
    } catch (err) {
      existingTasks = [];
      skeleton.style.display = 'none';
      emptyText.textContent = "Не удалось загрузить список";
      emptyEl.style.display = "flex";
      return;
    }

    skeleton.style.display = 'none';
    renderExisting();
  }

  function renderExisting() {
    const listEl = document.getElementById('existingList');
    const emptyEl = document.getElementById('existingEmpty');
    const emptyText = document.getElementById('existingEmptyText');
    listEl.innerHTML = '';

    if (existingTasks.length === 0) {
      emptyText.textContent = "Активных напоминаний нет";
      emptyEl.style.display = "flex";
      return;
    }
    emptyEl.style.display = "none";

    existingTasks.forEach((t) => {
      const meta = formatExisting(t);
      const marked = deleteIds.has(t.id);
      const li = document.createElement('li');
      if (marked) li.classList.add('marked-delete');
      li.innerHTML = `
        <span class="item-icon">${meta.icon}</span>
        <span class="item-body">
          <span class="item-text">${escapeHtml(t.text)}</span>
          <span class="item-meta">${meta.label}</span>
        </span>
        <button class="del-btn ${marked ? 'active' : ''}" data-id="${t.id}" aria-label="Удалить напоминание «${escapeHtml(t.text)}»">${trashIcon}</button>
      `;
      listEl.appendChild(li);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('existingList').addEventListener('click', (e) => {
    const btn = e.target.closest('.del-btn');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    if (deleteIds.has(id)) deleteIds.delete(id);
    else deleteIds.add(id);
    tg?.HapticFeedback?.impactOccurred('light');
    renderExisting();
    updateMainButton();
  });

  function renderNew() {
    const listEl = document.getElementById('newList');
    const card = document.getElementById('newCard');
    const title = document.getElementById('newSectionTitle');
    listEl.innerHTML = '';

    if (newItems.length === 0) {
      card.style.display = 'none';
      title.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    title.style.display = 'block';

    newItems.forEach((item, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="item-icon is-new">${clockIcon}</span>
        <span class="item-body">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <span class="item-meta">на ${item.time}</span>
        </span>
        <button class="del-btn active" data-i="${i}" aria-label="Убрать «${escapeHtml(item.text)}» из списка">${closeIcon}</button>
      `;
      listEl.appendChild(li);
    });
  }

  document.getElementById('newList').addEventListener('click', (e) => {
    const btn = e.target.closest('.del-btn');
    if (!btn) return;
    const i = Number(btn.dataset.i);
    newItems.splice(i, 1);
    renderNew();
    updateMainButton();
  });

  function updateMainButton() {
    if (!tg) return;
    const addCount = newItems.length;
    const delCount = deleteIds.size;

    if (addCount === 0 && delCount === 0) {
      tg.MainButton.hide();
      return;
    }

    const parts = [];
    if (addCount) parts.push(`добавить ${addCount}`);
    if (delCount) parts.push(`удалить ${delCount}`);
    tg.MainButton.setText(`Отправить боту (${parts.join(", ")})`);
    tg.MainButton.show();
  }

  function addItem() {
    const textInput = document.getElementById('newItem');
    const timeInput = document.getElementById('newTime');
    const text = textInput.value.trim();
    const time = timeInput.value;

    if (!text) {
      textInput.focus();
      return;
    }
    if (!time) {
      tg?.showAlert ? tg.showAlert('Укажите время напоминания') : alert('Укажите время напоминания');
      timeInput.focus();
      return;
    }

    newItems.push({ text, time });
    textInput.value = '';
    timeInput.value = '';
    tg?.HapticFeedback?.impactOccurred('light');
    renderNew();
    updateMainButton();
    textInput.focus();
  }

  document.getElementById('addBtn').addEventListener('click', addItem);
  document.getElementById('newItem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
  });
  document.getElementById('newTime').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
  });

  if (tg) {
    tg.MainButton.onClick(() => {
      tg.sendData(JSON.stringify({
        new_items: newItems,
        delete_ids: Array.from(deleteIds),
      }));
    });
  }

  loadExisting();
  renderNew();
  updateMainButton();
</script>
</body>
</html>
